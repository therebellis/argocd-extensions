name: Release Helm Charts

on:
  workflow_dispatch:
    inputs:
      chart:
        description: "Chart to release (e.g. cve-scanner) — leave blank to release all"
        required: false
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package charts
        run: |
          mkdir -p /tmp/helm-packages

          if [[ -n "${{ github.event.inputs.chart }}" ]]; then
            charts=("argocd-extension-charts/${{ github.event.inputs.chart }}")
          else
            charts=(argocd-extension-charts/*)
          fi

          for chart in "${charts[@]}"; do
            if [[ -f "$chart/Chart.yaml" ]]; then
              echo "Packaging $chart..."
              helm package "$chart" -d /tmp/helm-packages
            fi
          done

          ls /tmp/helm-packages/

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update gh-pages index
        run: |
          cp /tmp/helm-packages/*.tgz gh-pages/
          helm repo index gh-pages/ --url https://therebellis.github.io/argocd-extensions/

      - name: Commit and push gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to release." && exit 0
          git commit -m "release: update Helm chart packages [skip ci]"
          git push origin gh-pages
